AWSTemplateFormatVersion: '2010-09-09'
Transform: AWS::Serverless-2016-10-31

Parameters:
  PlayerTableName:
    Type: String
    Default: epilot-btc-guess-players
    Description: DynamoDB table name for player state.
  DynamoDbEndpoint:
    Type: String
    Default: ''
    Description: Optional DynamoDB endpoint override for local development.

Resources:
  PlayerTable:
    Type: AWS::DynamoDB::Table
    Properties:
      TableName: !Ref PlayerTableName
      BillingMode: PAY_PER_REQUEST
      AttributeDefinitions:
        - AttributeName: userId
          AttributeType: S
      KeySchema:
        - AttributeName: userId
          KeyType: HASH

  GameApi:
    Type: AWS::Serverless::HttpApi
    Properties:
      CorsConfiguration:
        AllowHeaders:
          - content-type
          - x-user-id
        AllowMethods:
          - GET
          - POST
          - OPTIONS
        AllowOrigins:
          - http://localhost:5173
          - http://127.0.0.1:5173

  ApiFunction:
    Type: AWS::Serverless::Function
    Properties:
      CodeUri: .
      Handler: handler.handler
      Runtime: nodejs22.x
      MemorySize: 256
      Timeout: 10
      Environment:
        Variables:
          COINGECKO_PRICE_URL: https://api.coingecko.com/api/v3/simple/price?ids=bitcoin&vs_currencies=usd
          COINGECKO_REQUEST_TIMEOUT_MS: '5000'
          GUESS_ELIGIBILITY_MS: '60000'
          PROVIDER_CACHE_TTL_MS: '10000'
          SNAPSHOT_SIGNING_SECRET: local-dev-snapshot-signing-secret
          SNAPSHOT_VALIDITY_MS: '30000'
          CORS_ALLOWED_ORIGINS: http://localhost:5173,http://127.0.0.1:5173
          PLAYER_TABLE_NAME: !Ref PlayerTableName
          DYNAMODB_ENDPOINT: !Ref DynamoDbEndpoint
      Policies:
        - DynamoDBCrudPolicy:
            TableName: !Ref PlayerTableName
      Events:
        Health:
          Type: HttpApi
          Properties:
            ApiId: !Ref GameApi
            Path: /health
            Method: get
        State:
          Type: HttpApi
          Properties:
            ApiId: !Ref GameApi
            Path: /state
            Method: get
        CreateGuess:
          Type: HttpApi
          Properties:
            ApiId: !Ref GameApi
            Path: /guesses
            Method: post
        ResolveGuess:
          Type: HttpApi
          Properties:
            ApiId: !Ref GameApi
            Path: /guesses/resolve
            Method: post
    Metadata:
      BuildMethod: makefile
