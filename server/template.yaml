AWSTemplateFormatVersion: '2010-09-09'
Transform: AWS::Serverless-2016-10-31

Resources:
  ApiFunction:
    Type: AWS::Serverless::Function
    Properties:
      CodeUri: .
      Handler: handler.handler
      Runtime: nodejs22.x
      Events:
        Health:
          Type: HttpApi
          Properties:
            Path: /health
            Method: get
    Metadata:
      BuildMethod: makefile
