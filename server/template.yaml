AWSTemplateFormatVersion: '2010-09-09'
Transform: AWS::Serverless-2016-10-31

Parameters:
  PlayerTableName:
    Type: String
    Default: epilot-btc-guess-players
    Description: DynamoDB table name for player state.
  FrontendOrigin:
    Type: String
    Default: http://localhost:5173
    Description: Browser origin allowed to call the game API.
  SnapshotSigningSecret:
    Type: String
    NoEcho: true
    Description: Secret used to sign price snapshot tokens.
  DynamoDbEndpoint:
    Type: String
    Default: ''
    Description: Optional DynamoDB endpoint override for local development.

Resources:
  PlayerTable:
    Type: AWS::DynamoDB::Table
    Properties:
      TableName: !Ref PlayerTableName
      BillingMode: PROVISIONED
      AttributeDefinitions:
        - AttributeName: userId
          AttributeType: S
      KeySchema:
        - AttributeName: userId
          KeyType: HASH
      ProvisionedThroughput:
        ReadCapacityUnits: 1
        WriteCapacityUnits: 1

  GameApi:
    Type: AWS::Serverless::HttpApi
    Properties:
      CorsConfiguration:
        AllowHeaders:
          - content-type
          - x-user-id
        AllowMethods:
          - GET
          - POST
          - OPTIONS
        AllowOrigins:
          - !Ref FrontendOrigin

  ApiFunction:
    Type: AWS::Serverless::Function
    Properties:
      CodeUri: .
      Handler: handler.handler
      Runtime: nodejs24.x
      MemorySize: 256
      Timeout: 10
      Environment:
        Variables:
          COINGECKO_PRICE_URL: https://api.coingecko.com/api/v3/simple/price?ids=bitcoin&vs_currencies=usd
          COINGECKO_REQUEST_TIMEOUT_MS: '5000'
          GUESS_ELIGIBILITY_MS: '60000'
          PROVIDER_CACHE_TTL_MS: '10000'
          SNAPSHOT_SIGNING_SECRET: !Ref SnapshotSigningSecret
          SNAPSHOT_VALIDITY_MS: '30000'
          CORS_ALLOWED_ORIGINS: !Ref FrontendOrigin
          PLAYER_TABLE_NAME: !Ref PlayerTableName
          DYNAMODB_ENDPOINT: !Ref DynamoDbEndpoint
      Policies:
        - DynamoDBCrudPolicy:
            TableName: !Ref PlayerTableName
      Events:
        Health:
          Type: HttpApi
          Properties:
            ApiId: !Ref GameApi
            Path: /health
            Method: get
        State:
          Type: HttpApi
          Properties:
            ApiId: !Ref GameApi
            Path: /state
            Method: get
        Price:
          Type: HttpApi
          Properties:
            ApiId: !Ref GameApi
            Path: /price
            Method: get
        CreateGuess:
          Type: HttpApi
          Properties:
            ApiId: !Ref GameApi
            Path: /guesses
            Method: post
        ResolveGuess:
          Type: HttpApi
          Properties:
            ApiId: !Ref GameApi
            Path: /guesses/resolve
            Method: post
    Metadata:
      BuildMethod: makefile

  ApiFunctionLogGroup:
    Type: AWS::Logs::LogGroup
    Properties:
      LogGroupName: !Sub /aws/lambda/${ApiFunction}
      RetentionInDays: 7

Outputs:
  GameApiUrl:
    Description: API Gateway HTTP API URL.
    Value: !Sub https://${GameApi}.execute-api.${AWS::Region}.${AWS::URLSuffix}
  PlayerTableName:
    Description: DynamoDB table name used for player state.
    Value: !Ref PlayerTable
